<!-- Code from d3-graph-gallery.com -->
<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>

<!-- Create a div where the graph will take place -->
<div id="social_impact "></div>


<script>
var margin = {top: 10, right: 30, bottom: 30, left: 60},
    width = 460 - margin.left - margin.right,
    height = 400 - margin.top - margin.bottom;

    var svg = d3.select("social_impact")
    .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
    .append("g")
    .attr("transform", 
            "translate(" + margin.left + "," + margin.top + ")");

    d3.csv("SOCIAL_IMPACT.csv", function(data) {

    var sumstat = d3.nest()
    .key(function(d) { return d.CATEGORY;})
    .entries(data);

    //X AXIS
    var x = d3.scaleLinear()
    .domain([d3.extent(data, function(d) { return +d.SCORE; })])
    .range([0, width]);
    svg.append("g")
    .attr("transform", "translate(0," + height + ")")
    .call(d3.axisBottom(x).ticks(5));

    //Y AXIS
    var y = d3.scaleLinear()
    .domain([0, d3.max(data, function(d) { return +d.n; })]) //should be SCORE?
    .range([height, 0]);
    svg.append("g")
    .call(d3.axisLeft(y));

    var res = sumstat.map(function(d){ return d.key }) 
    var color = d3.scaleOrdinal()
    .domain(res)
    .range(['#e41a1c','#377eb8','#4daf4a','#984ea3','#ff7f00','#ffff33','#a65628','#f781bf','#999999'])
    svg.selectAll(".line")
    .data(sumstat)
    .enter()
    .append("path")
    .attr("fill", "none")
    .attr("stroke", function(d){return color(d.key)})
    .attr("stroke-width", 1.5)
    .attr("d", function(d){
        return d3.line()
        .x(function(d) { return x(+d.SCORE); })
        .y(function(d) { return y(+d.n); })
        (d.values)
})

})

</script>
